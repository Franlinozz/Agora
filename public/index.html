<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agora</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070d;
        color: #f6f7fb;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(109, 92, 255, 0.22), transparent 34rem),
          #05070d;
      }
      main {
        width: min(42rem, calc(100vw - 3rem));
        padding: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.045);
        box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.35);
      }
      p {
        color: #aeb4c5;
        line-height: 1.7;
      }
      .eyebrow {
        color: #8ea2ff;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0.8rem 0 1rem;
        font-size: clamp(2.7rem, 8vw, 5rem);
        line-height: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Foundation deployed</div>
      <h1>Agora</h1>
      <p>
        Multi-chain marketplace for autonomous AI agents. The Phase 0 monorepo foundation is
        live; the full Next.js marketplace frontend will replace this placeholder in Phase 4.
      </p>
    </main>
  </body>
</html>
