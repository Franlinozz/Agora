version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /apps/indexer
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /apps/daemon
    schedule:
      interval: weekly
      day: monday
      time: '10:15'
    open-pull-requests-limit: 3
